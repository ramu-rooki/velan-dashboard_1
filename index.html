<title>Velan Metrology – Production Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #050b14;
  --bg-secondary: #0a1628;
  --bg-card: #0d1f35;
  --bg-card2: #0f2540;
  --border: #1a3a5c;
  --border-bright: #1e4976;
  --accent1: #00c9ff;
  --accent2: #0fa8e0;
  --accent3: #00ff9d;
  --accent4: #ff6b35;
  --accent5: #ffd60a;
  --accent6: #b24bff;
  --text-primary: #e2f0ff;
  --text-secondary: #7ba7cc;
  --text-muted: #3d6080;
  --danger: #ff3d5a;
  --warning: #ffb836;
  --success: #00e676;
  --glow1: rgba(0,201,255,0.15);
  --glow2: rgba(0,255,157,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse at 20% 20%, rgba(0,100,180,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(0,200,120,0.05) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}
#root { position:relative; z-index:1; }

/* HEADER */
.header {
  background: linear-gradient(135deg, #070f1e 0%, #0a1a30 100%);
  border-bottom: 1px solid var(--border-bright);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.logo-mark {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent1), var(--accent2));
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display:flex; align-items:center; justify-content:center;
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:14px;
  color:#000; flex-shrink:0;
}
.logo-text { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:22px; letter-spacing:3px; color:var(--text-primary); }
.logo-sub { font-size:10px; letter-spacing:4px; color:var(--text-secondary); font-family:'Share Tech Mono',monospace; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.live-badge {
  display:flex; align-items:center; gap:6px;
  background: rgba(0,230,118,0.1); border:1px solid rgba(0,230,118,0.3);
  padding:4px 10px; border-radius:20px; font-size:11px; font-family:'Share Tech Mono',monospace;
  color:var(--success);
}
.live-dot { width:6px; height:6px; background:var(--success); border-radius:50%; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.timestamp { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-muted); }

/* MAIN LAYOUT */
.main-container { display:flex; min-height:calc(100vh - 64px); }
.sidebar {
  width: 220px; flex-shrink:0;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 16px 0;
  position: sticky; top: 64px; height: calc(100vh - 64px);
  overflow-y: auto;
}
.nav-section { padding: 8px 16px 4px; font-size:9px; letter-spacing:3px; color:var(--text-muted); font-family:'Share Tech Mono',monospace; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding: 10px 16px; cursor:pointer; font-size:13px; font-weight:600;
  color: var(--text-secondary); border-left:3px solid transparent;
  transition: all 0.2s; letter-spacing:0.5px;
}
.nav-item:hover { color:var(--accent1); background:rgba(0,201,255,0.05); }
.nav-item.active { color:var(--accent1); border-left-color:var(--accent1); background:rgba(0,201,255,0.08); }
.nav-icon { font-size:16px; }

/* CONTENT */
.content { flex:1; padding:20px; overflow-x:hidden; }

/* FILTER BAR */
.filter-bar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
}
.filter-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); font-family:'Share Tech Mono',monospace; }
.filter-select, .filter-input {
  background: var(--bg-secondary); border:1px solid var(--border);
  color: var(--text-primary); padding: 6px 12px; border-radius:6px;
  font-size:12px; font-family:'Exo 2',sans-serif; outline:none; cursor:pointer;
  min-width:140px;
}
.filter-select:focus, .filter-input:focus { border-color:var(--accent1); }
.filter-btn {
  padding: 6px 16px; border-radius:6px; border:1px solid var(--border-bright);
  background:transparent; color:var(--text-secondary); font-size:12px; cursor:pointer;
  font-family:'Exo 2',sans-serif; font-weight:600; transition:all 0.2s;
}
.filter-btn:hover { background:rgba(0,201,255,0.1); color:var(--accent1); border-color:var(--accent1); }
.filter-btn.active { background:rgba(0,201,255,0.15); color:var(--accent1); border-color:var(--accent1); }
.filter-btn.reset { color:var(--text-muted); }

/* KPIS */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:20px; }
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
  position:relative; overflow:hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.kpi-card:hover { transform:translateY(-2px); border-color:var(--border-bright); }
.kpi-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--c1,var(--accent1)), var(--c2,var(--accent2)));
}
.kpi-label { font-size:10px; letter-spacing:2px; color:var(--text-muted); font-family:'Share Tech Mono',monospace; margin-bottom:8px; }
.kpi-value { font-family:'Rajdhani',sans-serif; font-size:32px; font-weight:700; color:var(--text-primary); line-height:1; }
.kpi-sub { font-size:11px; color:var(--text-secondary); margin-top:4px; }
.kpi-badge {
  display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600;
  margin-top:6px;
}
.badge-green { background:rgba(0,230,118,0.15); color:var(--success); }
.badge-red { background:rgba(255,61,90,0.15); color:var(--danger); }
.badge-yellow { background:rgba(255,184,54,0.15); color:var(--warning); }
.badge-blue { background:rgba(0,201,255,0.15); color:var(--accent1); }

/* CHART CARDS */
.chart-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:20px; }
.chart-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 18px;
  position:relative;
}
.chart-card.full { grid-column:1/-1; }
.chart-card.col2 { grid-column:span 2; }
.chart-title {
  font-family:'Rajdhani',sans-serif; font-weight:700; font-size:15px; letter-spacing:1px;
  color:var(--text-primary); margin-bottom:4px;
}
.chart-sub { font-size:11px; color:var(--text-muted); margin-bottom:14px; font-family:'Share Tech Mono',monospace; }
.chart-wrap { position:relative; height:220px; }
.chart-wrap-sm { position:relative; height:170px; }
.chart-wrap-lg { position:relative; height:300px; }

/* TABLE */
.table-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px; margin-bottom:20px; overflow:hidden;
}
.table-header {
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.table-wrap { overflow-x:auto; max-height:420px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th {
  background: var(--bg-secondary); padding:10px 12px;
  text-align:left; font-size:10px; letter-spacing:1.5px;
  color:var(--text-muted); font-family:'Share Tech Mono',monospace;
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:2;
}
td {
  padding:9px 12px; border-bottom:1px solid rgba(26,58,92,0.5);
  color:var(--text-secondary); font-size:12px;
}
tr:hover td { background:rgba(0,201,255,0.04); }
.status-pill {
  display:inline-block; padding:2px 10px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:0.5px; font-family:'Share Tech Mono',monospace;
}
.s-ready { background:rgba(0,230,118,0.15); color:var(--success); }
.s-stores { background:rgba(0,201,255,0.15); color:var(--accent1); }
.s-wip { background:rgba(255,184,54,0.15); color:var(--warning); }
.s-vendor { background:rgba(178,75,255,0.15); color:var(--accent6); }
.s-va { background:rgba(255,107,53,0.15); color:var(--accent4); }
.s-lathe { background:rgba(255,61,90,0.15); color:var(--danger); }

/* UPLOAD ZONE */
.upload-zone {
  border: 2px dashed var(--border-bright);
  border-radius:12px; padding:32px 24px; text-align:center;
  background: rgba(0,201,255,0.03); cursor:pointer;
  transition: all 0.3s;
}
.upload-zone:hover, .upload-zone.drag { border-color:var(--accent1); background:rgba(0,201,255,0.08); }
.upload-icon { font-size:40px; margin-bottom:12px; }
.upload-text { color:var(--text-secondary); font-size:14px; margin-bottom:4px; }
.upload-sub { color:var(--text-muted); font-size:11px; font-family:'Share Tech Mono',monospace; }

/* SECTION TITLE */
.section-title {
  font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:800;
  letter-spacing:2px; color:var(--text-primary); margin-bottom:16px;
  display:flex; align-items:center; gap:10px;
}
.section-title span { color:var(--accent1); }
.section-line { flex:1; height:1px; background:linear-gradient(90deg,var(--border-bright),transparent); margin-left:12px; }

/* VENDOR TABLE */
.vendor-bar-wrap { display:flex; flex-direction:column; gap:8px; }
.vendor-row { display:flex; align-items:center; gap:10px; }
.vendor-name { width:90px; font-size:12px; color:var(--text-secondary); font-family:'Share Tech Mono',monospace; flex-shrink:0; }
.vendor-bar-bg { flex:1; height:18px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden; }
.vendor-bar-fill { height:100%; border-radius:4px; transition:width 0.8s ease; }
.vendor-val { width:50px; text-align:right; font-size:11px; color:var(--text-muted); }

/* TIMELINE */
.timeline-item {
  display:flex; gap:14px; padding:10px 0;
  border-bottom:1px solid rgba(26,58,92,0.4);
}
.tl-dot { width:8px; height:8px; border-radius:50%; background:var(--accent1); margin-top:4px; flex-shrink:0; box-shadow:0 0 8px var(--accent1); }
.tl-content { flex:1; }
.tl-sc { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--accent1); }
.tl-desc { font-size:12px; color:var(--text-secondary); margin:2px 0; }
.tl-time { font-size:10px; color:var(--text-muted); font-family:'Share Tech Mono',monospace; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:16px; }
.tab {
  padding:8px 18px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;
  color:var(--text-muted); background:transparent; border:1px solid transparent;
  transition:all 0.2s;
}
.tab:hover { color:var(--text-secondary); }
.tab.active { background:rgba(0,201,255,0.12); color:var(--accent1); border-color:rgba(0,201,255,0.3); }

/* Responsive */
@media (max-width:1100px) { .chart-grid { grid-template-columns:1fr; } .chart-grid-3 { grid-template-columns:repeat(2,1fr); } }
@media (max-width:700px) { .sidebar { display:none; } .kpi-grid { grid-template-columns:repeat(2,1fr); } }

/* Scrollbar */
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg-secondary); }
::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--accent2); }

.text-accent { color:var(--accent1); }
.text-success { color:var(--success); }
.text-danger { color:var(--danger); }
.text-warning { color:var(--warning); }
.fw7 { font-weight:700; }
.mono { font-family:'Share Tech Mono',monospace; }
</style>

// ─── HELPERS ────────────────────────────────────────────────────────────────
const AIRPLUG_TYPES = ['APG','ARG'];
const MASTER_TYPES  = ['SPG','SRG','SP','SRG'];
const TARGET_DAYS   = 21;

function getProductCategory(type) {
  if(['APG','ARG'].includes(type)) return 'AIRPLUG';
  if(['SPG','SRG','SP'].includes(type)) return 'MASTER';
  return 'ACCESSORY';
}

function daysBetween(d1Str, d2Str) {
  if(!d1Str||!d2Str) return null;
  const d1=new Date(d1Str.substring(0,10));
  const d2=new Date(d2Str.substring(0,10));
  return Math.round((d2-d1)/(1000*60*60*24));
}

function getStageColor(stage) {
  if(!stage) return '#3d6080';
  const s = stage.toUpperCase();
  if(s==='READY') return '#00e676';
  if(s==='STORES') return '#00c9ff';
  if(s.includes('LATHE')) return '#ff3d5a';
  if(s.includes('VA')) return '#ff6b35';
  if(s.includes('CG')) return '#ffd60a';
  if(s.includes('SG')) return '#0fa8e0';
  if(s.includes('HT')) return '#ff6b35';
  if(s.includes('QC')) return '#b24bff';
  if(s.includes('M1')) return '#ff3d5a';
  if(s.includes('FB')) return '#ffd60a';
  if(['SDV','SDV','BLV','FBV','HTV','HOV','HCV'].some(v=>s.includes(v.replace('V','')))) return '#b24bff';
  if(s==='STOCK') return '#00c9ff';
  return '#7ba7cc';
}

function getVendorCode(stage,inhouse) {
  if(inhouse==='VENDOR') {
    if(stage&&stage.endsWith('V')) return stage.slice(0,-1);
    return 'EXT';
  }
  return null;
}

// Determine SC completion: all items in SC are READY or STORES
function isSCComplete(items) {
  return items.every(i=>['READY','STORES','STOCK'].includes(i.currentStage));
}

function getSCLastTimestamp(items) {
  const ts = items.map(i=>i.timestamp).filter(Boolean).sort().pop();
  return ts;
}

// ─── CHART HELPERS ────────────────────────────────────────────────────────────
function useChart(ref, config, deps) {
  useEffect(() => {
    if(!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const chart = new Chart(ctx, config);
    return () => chart.destroy();
  }, deps);
}

function App() {
  const [data, setData] = useState(SAMPLE_DATA);
  const [activeNav, setActiveNav] = useState('overview');
  const [filters, setFilters] = useState({ po:'', stage:'', type:'', inhouse:'', category:'', search:'' });
  const [now] = useState(new Date());

  // ── PARSE UPLOADED EXCEL / JSON ──────────────────────────────────────────
  const [uploadStatus, setUploadStatus] = useState(null);

  // ── Auto-detect product TYPE from product name ────────────────────────────
  function inferType(productName) {
    if(!productName) return 'ACCESSORY';
    const p = String(productName).toUpperCase().trim();
    if(p.startsWith('APG') || p.startsWith('2 PAIR APG')) return 'APG';
    if(p.startsWith('ARG')) return 'ARG';
    if(p.startsWith('SRG')) return 'SRG';
    if(p.startsWith('SP ') || p.startsWith('SP\t') || p === 'SP' || /^SP DIA/.test(p)) return 'SP';
    if(p.startsWith('SPG')) return 'SPG';
    return 'ACCESSORY';
  }

  // ── Parse the real Velan Excel format (merged cells / no type column) ─────
  function parseVelanExcel(rows) {
    // rows is raw array-of-arrays from XLSX with header=none
    // Structure: 
    //   Col 0=SNO, 1=PO NO, 2=PO RECD DATE, 3=SC, 4=CustomerName(merged row),
    //   5=Product Name, 6=QTY, 7=STATUS1, 8=STATUS2, 9=INHOUSE/VENDOR, 10=OP(stage), 11=TIMESTAMP
    // PO NO and PO DATE fill down within a PO group (only in first row of group)
    // SC fills down within SC sub-group

    const result = [];
    let currentPO = '', currentPODate = '', currentSC = '';

    for(const row of rows) {
      const v = (i) => (row[i] !== undefined && row[i] !== null && String(row[i]).trim() !== '' && String(row[i]).trim() !== 'nan') ? String(row[i]).trim() : null;

      // Skip header rows and title rows
      const col1 = v(1); const col5 = v(5);
      if(!col5 || col5 === 'Product Name' || col5 === 'Customer Name') continue;
      if(col1 && (col1.includes('VELAN') || col1 === 'PO NO')) continue;

      // Update running PO and date if present in this row
      if(col1 && col1 !== 'NaN' && !col1.includes('SETS') && !col1.match(/^\d{4}/) ) currentPO = col1;
      const col2 = v(2);
      if(col2 && col2.includes('-')) {
        // looks like a date
        const d = col2.substring(0,10);
        if(/\d{4}-\d{2}-\d{2}/.test(d)) currentPODate = d;
      }

      // SC: col3 may have the SC value; sometimes has "1166- 3 SETS" note — strip that
      const col3 = v(3);
      if(col3 && !col3.toUpperCase().includes('SET')) {
        currentSC = col3.replace(/\s+/g,''); // normalize SC like "1166- 2" → "1166-2"
      }

      const product = col5;
      const status1 = v(7) || '';
      const status2 = v(8) || '';
      const inhouseRaw = v(9) || 'INHOUSE';
      const inhouse = inhouseRaw.toUpperCase().includes('VENDOR') ? 'VENDOR' : 'INHOUSE';
      const currentStage = v(10) || '';
      const tsRaw = v(11) || '';
      const timestamp = tsRaw.substring(0,19).replace('T',' ');
      const type = inferType(product);

      if(currentSC && product) {
        result.push({
          sc: currentSC,
          po: currentPO,
          poDate: currentPODate,
          product,
          type,
          status1,
          status2,
          inhouse,
          currentStage,
          timestamp,
        });
      }
    }
    return result;
  }

  // ── Generic flat-row parser (standard CSV/Excel with headers) ────────────
  function parseGenericRows(rows) {
    const norm = s => String(s||'').replace(/[\s\/\-_]+/g,'').toLowerCase();
    const pickField = (r, candidates) => {
      for(const c of candidates) {
        const val = r[norm(c)];
        if(val !== undefined && val !== null && String(val).trim() !== '') return String(val).trim();
      }
      for(const c of candidates) {
        const word = norm(c);
        for(const k of Object.keys(r)) {
          if(norm(k).includes(word) && r[k] !== undefined && r[k] !== null && String(r[k]).trim() !== '')
            return String(r[k]).trim();
        }
      }
      return '';
    };
    const normalizeHeaders = row => {
      const n = {};
      Object.entries(row).forEach(([k,v]) => { n[norm(k)] = v; });
      return n;
    };
    return rows.map(raw => {
      const r = normalizeHeaders(raw);
      const product = pickField(r, ['product name','productname','product','item description','description']);
      const typeRaw  = pickField(r, ['type','product type','producttype','dtype']);
      const type     = typeRaw || inferType(product);
      const inhouseRaw = pickField(r, ['inhouse/ vendor','inhouse/vendor','inhousevendor','inhouse vendor','inhouse','location','vendor status']);
      const inhouse  = inhouseRaw.toUpperCase().includes('VENDOR') ? 'VENDOR' : inhouseRaw ? 'INHOUSE' : 'INHOUSE';
      return {
        sc:           pickField(r, ['sc','sc no','sc#','scno']).replace(/\s+/g,''),
        po:           pickField(r, ['po no','pono','po','purchase order']),
        poDate:       pickField(r, ['po recd date','porecddate','po date','podate','date received','date']).substring(0,10),
        product,
        type,
        status1:      pickField(r, ['status 1','status1','current operation','operation']),
        status2:      pickField(r, ['status 2','status2','next operation']),
        inhouse,
        currentStage: pickField(r, ['currentstage','current stage','stage','op timestamp','op','optimestamp']),
        timestamp:    pickField(r, ['timestamp','time stamp','last updated','op time']).substring(0,19),
      };
    }).filter(r => r.sc || r.po);
  }

  function handleFileUpload(file) {
    if(!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();
    setUploadStatus({type:'loading', msg:`⏳ Reading "${file.name}"…`});

    const finalize = (rows, fileName) => {
      if(!rows || rows.length === 0) {
        setUploadStatus({type:'error', msg:'No valid rows found in file.', detail:'Check that the file has data and correct column names.'});
        return;
      }
      const missingStage = rows.filter(r=>!r.currentStage).length;
      setData(rows);
      setUploadStatus({
        type:'success',
        msg:`✅ ${rows.length} rows loaded from "${fileName}" — types auto-detected from product names`,
        detail: missingStage > 0 ? `⚠ ${missingStage} rows have no stage value` : null,
      });
    };

    if(ext === 'json') {
      reader.onload = e => {
        try {
          const parsed = JSON.parse(e.target.result);
          const rows = Array.isArray(parsed) ? parsed : [parsed];
          // auto-detect type if missing
          rows.forEach(r => { if(!r.type) r.type = inferType(r.product||r['Product Name']||''); });
          finalize(rows, file.name);
        } catch(err) { setUploadStatus({type:'error', msg:'Invalid JSON.', detail:String(err)}); }
      };
      reader.readAsText(file);

    } else if(['xlsx','xls'].includes(ext)) {
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, {type:'array', cellDates:true, raw:false});
          const ws = wb.Sheets[wb.SheetNames[0]];

          // Try raw array-of-arrays first to detect Velan format
          const rawAoA = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:false});
          // Detect Velan format: row 1 or 2 contains "VELAN METROLOGY" or headers look like SNO/PO NO/SC
          const isVelanFormat = rawAoA.slice(0,5).some(row =>
            row && row.some(cell => cell && String(cell).includes('VELAN METROLOGY'))
          ) || rawAoA.slice(0,6).some(row =>
            row && row.some(cell => String(cell||'').trim() === 'SNO')
          );

          if(isVelanFormat) {
            const parsed = parseVelanExcel(rawAoA);
            finalize(parsed, file.name);
          } else {
            // Standard flat format with headers
            const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
            finalize(parseGenericRows(rows), file.name);
          }
        } catch(err) { setUploadStatus({type:'error', msg:'Failed to read Excel.', detail:String(err)}); }
      };
      reader.readAsArrayBuffer(file);

    } else if(ext === 'csv') {
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, {type:'string'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
          finalize(parseGenericRows(rows), file.name);
        } catch(err) { setUploadStatus({type:'error', msg:'Failed to parse CSV.', detail:String(err)}); }
      };
      reader.readAsText(file);

    } else {
      setUploadStatus({type:'error', msg:`Unsupported file type: .${ext}`, detail:'Supported: .xlsx, .xls, .csv, .json'});
    }
  }

  // ── FILTERED DATA ──────────────────────────────────────────────────────────
  const filtered = useMemo(() => {
    return data.filter(row => {
      if(filters.po && row.po !== filters.po) return false;
      if(filters.stage && row.currentStage !== filters.stage) return false;
      if(filters.type && row.type !== filters.type) return false;
      if(filters.inhouse && row.inhouse !== filters.inhouse) return false;
      if(filters.category && getProductCategory(row.type) !== filters.category) return false;
      if(filters.search) {
        const s = filters.search.toLowerCase();
        if(!row.sc.toLowerCase().includes(s) && !row.product.toLowerCase().includes(s) && !row.po.toLowerCase().includes(s)) return false;
      }
      return true;
    });
  }, [data, filters]);

  // ── SC GROUPS ──────────────────────────────────────────────────────────────
  const scGroups = useMemo(() => {
    const g = {};
    filtered.forEach(row => {
      if(!g[row.sc]) g[row.sc] = { sc:row.sc, po:row.po, poDate:row.poDate, items:[] };
      g[row.sc].items.push(row);
    });
    return Object.values(g);
  }, [filtered]);

  // ── PO GROUPS ──────────────────────────────────────────────────────────────
  const poGroups = useMemo(() => {
    const g = {};
    data.forEach(row => {
      if(!g[row.po]) g[row.po] = { po:row.po, poDate:row.poDate, items:[] };
      g[row.po].items.push(row);
    });
    return Object.values(g);
  }, [data]);

  // ── KPIs ───────────────────────────────────────────────────────────────────
  const kpis = useMemo(() => {
    const totalItems = filtered.length;
    const ready = filtered.filter(r=>r.currentStage==='READY').length;
    const stores = filtered.filter(r=>r.currentStage==='STORES').length;
    const wip = filtered.filter(r=>!['READY','STORES','STOCK'].includes(r.currentStage)).length;
    const inhouse = filtered.filter(r=>r.inhouse==='INHOUSE').length;
    const vendor = filtered.filter(r=>r.inhouse==='VENDOR').length;

    // PO on-time analysis
    let onTime=0, delayed=0, onTimePOs=[], delayedPOs=[];
    poGroups.forEach(pg => {
      const lastTs = getSCLastTimestamp(pg.items);
      const days = daysBetween(pg.poDate, lastTs);
      const allDone = pg.items.every(i=>['READY','STORES','STOCK'].includes(i.currentStage));
      if(allDone) {
        if(days!==null && days<=TARGET_DAYS) { onTime++; onTimePOs.push({...pg,days}); }
        else { delayed++; delayedPOs.push({...pg,days}); }
      } else {
        // not done yet — check elapsed
        const elapsed = daysBetween(pg.poDate, new Date().toISOString().substring(0,10));
        if(elapsed!==null && elapsed>TARGET_DAYS) { delayed++; delayedPOs.push({...pg,days:elapsed,inProgress:true}); }
      }
    });
    const totalPOs = poGroups.length;
    const onTimePct = totalPOs>0 ? Math.round(onTime/totalPOs*100) : 0;

    // Stage WIP counts
    const stageCounts = {};
    filtered.forEach(r=>{ stageCounts[r.currentStage]=(stageCounts[r.currentStage]||0)+1; });

    // Bottleneck – POs with highest days
    const bottleneck = [...poGroups].map(pg=>{
      const lastTs = getSCLastTimestamp(pg.items);
      const done = pg.items.every(i=>['READY','STORES','STOCK'].includes(i.currentStage));
      const days = done
        ? daysBetween(pg.poDate, lastTs)
        : daysBetween(pg.poDate, new Date().toISOString().substring(0,10));
      return {...pg, days, done};
    }).sort((a,b)=>(b.days||0)-(a.days||0));

    // Vendor evaluation
    const vendorMap = {};
    data.forEach(r=>{
      if(r.inhouse==='VENDOR') {
        const vcode = r.currentStage||'UNKNOWN';
        if(!vendorMap[vcode]) vendorMap[vcode]={code:vcode,count:0,items:[]};
        vendorMap[vcode].count++;
        vendorMap[vcode].items.push(r);
      }
    });
    const vendorTotal = Object.values(vendorMap).reduce((s,v)=>s+v.count,0);
    const vendors = Object.values(vendorMap).sort((a,b)=>b.count-a.count).map(v=>({...v,pct:Math.round(v.count/Math.max(vendorTotal,1)*100)}));

    // SC completion times
    const scCompletion = scGroups.map(sg=>{
      const done = isSCComplete(sg.items);
      const lastTs = getSCLastTimestamp(sg.items);
      const days = daysBetween(sg.poDate, lastTs);
      return {...sg, done, lastTs, days};
    });

    return {totalItems,ready,stores,wip,inhouse,vendor,onTime,delayed,onTimePct,totalPOs,stageCounts,bottleneck,vendors,vendorTotal,scCompletion,delayedPOs,onTimePOs};
  }, [filtered, scGroups, poGroups, data]);

  // ── UNIQUE OPTIONS ─────────────────────────────────────────────────────────
  const uniquePOs     = useMemo(()=>[...new Set(data.map(r=>r.po))].sort(),[data]);
  const uniqueStages  = useMemo(()=>[...new Set(data.map(r=>r.currentStage))].filter(Boolean).sort(),[data]);
  const uniqueTypes   = useMemo(()=>[...new Set(data.map(r=>r.type))].filter(Boolean).sort(),[data]);

  // ── NAV ───────────────────────────────────────────────────────────────────
  const navItems = [
    {id:'overview',label:'Overview',icon:'⬡'},
    {id:'production',label:'Production',icon:'⚙'},
    {id:'wip',label:'Stage / WIP',icon:'⟳'},
    {id:'po',label:'PO Analysis',icon:'📋'},
    {id:'sc',label:'SC Sets',icon:'📦'},
    {id:'vendor',label:'Vendor Eval',icon:'🏭'},
    {id:'upload',label:'Upload Data',icon:'⬆'},
  ];

  return (
    <div>
      {/* HEADER */}
      <div className="header">
        <div className="logo-mark">VM</div>
        <div>
          <div className="logo-text">VELAN METROLOGY</div>
          <div className="logo-sub">PRODUCTION COMMAND CENTER</div>
        </div>
        <div className="header-right">
          <div className="live-badge"><div className="live-dot"/><span>LIVE</span></div>
          <div className="timestamp">{now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})} &nbsp;{now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>

      <div className="main-container">
        {/* SIDEBAR */}
        <div className="sidebar">
          <div className="nav-section">NAVIGATION</div>
          {navItems.map(n=>(
            <div key={n.id} className={`nav-item ${activeNav===n.id?'active':''}`} onClick={()=>setActiveNav(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </div>
          ))}
        </div>

        {/* CONTENT */}
        <div className="content">
          {/* FILTER BAR */}
          <div className="filter-bar">
            <div className="filter-label">FILTERS</div>
            <select className="filter-select" value={filters.po} onChange={e=>setFilters(f=>({...f,po:e.target.value}))}>
              <option value="">All POs</option>
              {uniquePOs.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <select className="filter-select" value={filters.stage} onChange={e=>setFilters(f=>({...f,stage:e.target.value}))}>
              <option value="">All Stages</option>
              {uniqueStages.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <select className="filter-select" value={filters.type} onChange={e=>setFilters(f=>({...f,type:e.target.value}))}>
              <option value="">All Types</option>
              {uniqueTypes.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
            <select className="filter-select" value={filters.category} onChange={e=>setFilters(f=>({...f,category:e.target.value}))}>
              <option value="">All Categories</option>
              <option value="AIRPLUG">Airplug (APG/ARG)</option>
              <option value="MASTER">Master (SRG/SP/SPG)</option>
              <option value="ACCESSORY">Accessories</option>
            </select>
            <select className="filter-select" value={filters.inhouse} onChange={e=>setFilters(f=>({...f,inhouse:e.target.value}))}>
              <option value="">Inhouse + Vendor</option>
              <option value="INHOUSE">Inhouse Only</option>
              <option value="VENDOR">Vendor Only</option>
            </select>
            <input className="filter-input" placeholder="Search SC / Product / PO..." value={filters.search} onChange={e=>setFilters(f=>({...f,search:e.target.value}))} style={{minWidth:200}}/>
            <button className="filter-btn reset" onClick={()=>setFilters({po:'',stage:'',type:'',inhouse:'',category:'',search:''})}>✕ Reset</button>
            <span style={{marginLeft:'auto',fontFamily:'Share Tech Mono',fontSize:11,color:'var(--text-muted)'}}>{filtered.length} items · {data.length} total</span>
          </div>

          {/* PAGES */}
          {activeNav==='overview' && <OverviewPage kpis={kpis} data={data} filtered={filtered}/>}
          {activeNav==='production' && <ProductionPage kpis={kpis} filtered={filtered}/>}
          {activeNav==='wip' && <WIPPage kpis={kpis} filtered={filtered}/>}
          {activeNav==='po' && <POPage kpis={kpis} poGroups={poGroups}/>}
          {activeNav==='sc' && <SCPage kpis={kpis} scGroups={scGroups}/>}
          {activeNav==='vendor' && <VendorPage kpis={kpis}/>}
          {activeNav==='upload' && <UploadPage onUpload={handleFileUpload} data={data} uploadStatus={uploadStatus} setUploadStatus={setUploadStatus}/>}
        </div>
      </div>
    </div>
  );
}

// ─── PRODUCTION PAGE ───────────────────────────────────────────────────────────
function ProductionPage({kpis, filtered}) {
  const dailyRef = useRef();
  const catRef = useRef();

  // Group by date of last timestamp
  const byDate = {};
  filtered.forEach(r=>{
    if(!r.timestamp) return;
    const d = r.timestamp.substring(0,10);
    if(!byDate[d]) byDate[d]={date:d,ready:0,stores:0,wip:0};
    if(r.currentStage==='READY') byDate[d].ready++;
    else if(r.currentStage==='STORES') byDate[d].stores++;
    else byDate[d].wip++;
  });
  const datesSorted = Object.keys(byDate).sort();
  const dateSeries = datesSorted.map(d=>byDate[d]);

  useChart(dailyRef, {
    type:'bar',
    data:{
      labels: dateSeries.map(d=>d.date.substring(5)),
      datasets:[
        {label:'Ready',data:dateSeries.map(d=>d.ready),backgroundColor:'#00e67699',borderColor:'#00e676',borderWidth:1,borderRadius:3},
        {label:'Stores',data:dateSeries.map(d=>d.stores),backgroundColor:'#00c9ff99',borderColor:'#00c9ff',borderWidth:1,borderRadius:3},

      </div>
      <div className="tabs">
        {[['all','All Sets'],['complete','Completed'],['wip','In Progress']].map(([id,label])=>(
          <div key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</div>
        ))}
      </div>
      <div className="table-card">
        <div className="table-header"><div className="chart-title">SC Sets — {displayed.length} entries</div></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>SC NO</th><th>PO</th><th>PO DATE</th><th>ITEMS</th><th>LAST TIMESTAMP</th><th>DAYS TAKEN</th><th>SET STATUS</th></tr></thead>
            <tbody>
              {displayed.map((sg,i)=>{
                const done = isSCComplete(sg.items);
                const lastTs = getSCLastTimestamp(sg.items);
                const days = daysBetween(sg.poDate, lastTs);
                return (
                  <tr key={i}>
                    <td className="mono text-accent fw7">{sg.sc}</td>
                    <td style={{fontSize:11}}>{sg.po}</td>
                    <td className="mono" style={{fontSize:11}}>{sg.poDate?.substring(0,10)}</td>
                    <td>{sg.items.length}</td>
                    <td className="mono" style={{fontSize:10}}>{lastTs?.substring(0,16)||'—'}</td>
                    <td><span style={{fontFamily:'Rajdhani',fontSize:18,fontWeight:700,color:done&&days!=null&&days>21?'var(--danger)':done?'var(--success)':'var(--warning)'}}>{days??'—'}</span></td>
                    <td><span className={`status-pill ${done?'s-ready':'s-wip'}`}>{done?'COMPLETE':'IN PROGRESS'}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

      {'SNO':'','PO NO':'','PO RECD DATE':'','SC':'1187','Product Name':'VERTICAL BENCH MOUNT PLATE','QTY':'1 NO','STATUS 1':'INHOUSE','STATUS 2':'','INHOUSE/ VENDOR':'VENDOR','OP':'SDV','TIMESTAMP':'2026-04-13 17:01:58'},
    ];
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:5},{wch:14},{wch:14},{wch:10},{wch:30},{wch:8},{wch:35},{wch:20},{wch:14},{wch:10},{wch:22}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'stdtrack');
    XLSX.writeFile(wb, 'velan_template.xlsx');
  }

  function exportCurrentData() {
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Production');
    XLSX.writeFile(wb, `velan_export_${new Date().toISOString().substring(0,10)}.xlsx`);
  }

  const statusColors = {
    success:{bg:'rgba(0,230,118,0.1)',border:'rgba(0,230,118,0.4)',color:'var(--success)'},
    error:  {bg:'rgba(255,61,90,0.1)', border:'rgba(255,61,90,0.4)',  color:'var(--danger)'},
    warn:   {bg:'rgba(255,184,54,0.1)',border:'rgba(255,184,54,0.4)', color:'var(--warning)'},
    loading:{bg:'rgba(0,201,255,0.08)',border:'rgba(0,201,255,0.3)',  color:'var(--accent1)'},
  };

  return (
    <div>
      <div className="section-title">Data <span>Upload</span><div className="section-line"/></div>

      {/* Status Banner */}
      {uploadStatus && (
        <div style={{
          background: statusColors[uploadStatus.type]?.bg || statusColors.loading.bg,
          border: `1px solid ${statusColors[uploadStatus.type]?.border || statusColors.loading.border}`,
          borderRadius:10, padding:'14px 18px', marginBottom:16,
          display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12
        }}>
          <div>
            <div style={{color: statusColors[uploadStatus.type]?.color || statusColors.loading.color, fontWeight:700, fontSize:14}}>
              {uploadStatus.msg}
            </div>
            {uploadStatus.detail && (
              <div style={{color:'var(--text-muted)', fontSize:11, fontFamily:'Share Tech Mono, monospace', marginTop:6, whiteSpace:'pre-line'}}>
                {uploadStatus.detail}
              </div>
            )}
          </div>
          <button onClick={()=>setUploadStatus(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:18,lineHeight:1,padding:0,flexShrink:0}}>✕</button>
        </div>
      )}

      <div className="chart-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
        <div className="chart-card">
          <div className="chart-title">Upload New Data</div>
          <div className="chart-sub">EXCEL (.XLSX / .XLS), CSV, OR JSON — FLEXIBLE COLUMN NAMES SUPPORTED</div>
          <div
            className={`upload-zone${drag?' drag':''}`}
            style={{marginTop:16}}
            onDragOver={e=>{e.preventDefault();setDrag(true)}}
            onDragLeave={()=>setDrag(false)}
            onDrop={handleDrop}
            onClick={()=>fileRef.current.click()}
          >
            <div className="upload-icon">{uploadStatus?.type==='loading'?'⏳':'📤'}</div>
            <div className="upload-text">
              {uploadStatus?.type==='loading' ? 'Processing file…' : 'Drag & Drop your file here'}
            </div>
            <div className="upload-sub">or click to browse — xlsx, xls, csv, json</div>
            <input
              ref={fileRef}
              type="file"
              accept=".xlsx,.xls,.csv,.json"
              style={{display:'none'}}
              onChange={handleFileChange}
            />
          </div>

          {/* Tips */}
          <div style={{marginTop:12,padding:'10px 14px',background:'rgba(0,201,255,0.05)',border:'1px solid rgba(0,201,255,0.15)',borderRadius:8}}>
            <div style={{fontSize:10,letterSpacing:2,color:'var(--text-muted)',fontFamily:'Share Tech Mono,monospace',marginBottom:6}}>TIPS — WHAT YOUR EXCEL NEEDS</div>
            <ul style={{color:'var(--text-secondary)',fontSize:11,paddingLeft:16,lineHeight:1.9}}>
              <li><span className="mono text-accent">No "type" column needed</span> — product type is auto-detected from the product name (APG, SRG, ARG, SP, etc.)</li>
              <li>Your Velan Excel format is <span className="mono text-accent">natively supported</span> — merged cells, PO fill-down, and the SNO/SC structure all parse correctly</li>
              <li>Required columns: <span className="mono text-accent">SC, PO NO, PO RECD DATE, Product Name, STATUS 1, INHOUSE/VENDOR, OP, TIMESTAMP</span></li>
              <li>The <span className="mono text-accent">OP</span> column (currentStage) drives all charts — make sure it has values like READY, LATHE, VA, CG etc.</li>
              <li>You can re-upload the same file — it reloads fresh each time</li>
            </ul>
          </div>

          <div style={{display:'flex',gap:10,marginTop:14}}>
            <button className="filter-btn" onClick={downloadTemplate} style={{flex:1,padding:'10px'}}>⬇ Download Template</button>
            <button className="filter-btn" onClick={exportCurrentData} style={{flex:1,padding:'10px'}}>📊 Export Current ({data.length} rows)</button>
          </div>
        </div>

        <div className="chart-card">
          <div className="chart-title">Column Mapping Guide</div>
          <div className="chart-sub">ACCEPTED COLUMN NAMES (ANY VARIATION WORKS)</div>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--text-muted)',fontFamily:'Share Tech Mono,monospace',marginBottom:6}}>YOUR EXCEL COLUMNS (VELAN FORMAT)</div>
          <div style={{overflowX:'auto',marginTop:8}}>
          <table>
            <thead><tr><th>YOUR COLUMN</th><th>MAPS TO</th><th>NOTES</th></tr></thead>
            <tbody>
              {[
                ['SC',              'Job Set No',       'Required. Fills down within each gauge set'],
                ['PO NO',           'Purchase Order',   'Required. Fills down within each PO group'],
                ['PO RECD DATE',    'PO Date',          'Date the PO was received'],
                ['Product Name',    'Product',          'Required. Type is AUTO-DETECTED from name prefix'],
                ['STATUS 1',        'Current Operation','What is happening now'],
                ['STATUS 2',        'Next Operation',   'Where it moves after current op'],
                ['INHOUSE/ VENDOR', 'Location',         '"INHOUSE" or "VENDOR"'],
                ['OP',              'Current Stage',    'Stage code: READY, LATHE, CG, VA, STORES etc.'],
                ['TIMESTAMP',       'Last Updated',     'Date-time of last status update'],
                ['type column',     '(not needed)',     '✅ Auto-inferred from Product Name prefix (APG/SRG/ARG/SP...)'],
              ].map(([col,maps,note],i)=>(
                <tr key={i}>
                  <td className="mono text-accent" style={{whiteSpace:'nowrap'}}>{col}</td>
                  <td style={{fontSize:11,color:'var(--text-secondary)',whiteSpace:'nowrap'}}>{maps}</td>
                  <td style={{fontSize:10,color:'var(--text-muted)'}}>{note}</td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        </div>
      </div>

      <div className="chart-card">
        <div className="chart-title">Current Data Preview — {data.length} rows loaded</div>
        <div className="chart-sub">FIRST 50 ROWS OF ACTIVE DATASET</div>
        <div className="table-wrap" style={{marginTop:12,maxHeight:320}}>
          <table>
            <thead><tr><th>SC</th><th>PO</th><th>PRODUCT</th><th>TYPE</th><th>STAGE</th><th>INHOUSE</th><th>TIMESTAMP</th></tr></thead>
            <tbody>{data.slice(0,50).map((r,i)=>(
              <tr key={i}>
                <td className="mono text-accent">{r.sc}</td>
                <td style={{fontSize:11}}>{r.po}</td>
                <td style={{fontSize:11,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.product}</td>
                <td><span className="status-pill badge-blue">{r.type||'—'}</span></td>
                <td>
                  <span className="status-pill" style={{background:getStageColor(r.currentStage)+'22',color:getStageColor(r.currentStage)}}>
                    {r.currentStage||'—'}
                  </span>
                </td>
                <td><span className={`status-pill ${r.inhouse==='VENDOR'?'s-vendor':'badge-blue'}`}>{r.inhouse}</span></td>
                <td className="mono" style={{fontSize:10}}>{r.timestamp?.substring(0,16)||'—'}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── KPI CARD ──────────────────────────────────────────────────────────────────
function KPICard({label,value,sub,color1,color2,badge}) {
  return (
    <div className="kpi-card" style={{'--c1':color1,'--c2':color2}}>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      {sub&&<div className="kpi-sub">{sub}</div>}
      {badge&&<div className={`kpi-badge ${badge.cls}`}>{badge.text}</div>}
    </div>
  );
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
